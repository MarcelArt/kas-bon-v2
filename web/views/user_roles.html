{{define "user_roles"}}
{{template "layout" .}}
{{end}}

{{define "user_roles_content"}}
<div class="user-roles-page">
  <a href="/domains/{{.DomainID}}" class="breadcrumb" hx-get="/domains/{{.DomainID}}" hx-target="#main-content" hx-select="#main-content" hx-swap="outerHTML" hx-push-url="true">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="10 2 4 8 10 14"></polyline>
    </svg>
    {{.DomainName}}
  </a>

  <div class="detail-header">
    <div>
      <h2 class="detail-title">{{.User.Username}}</h2>
      <p class="detail-desc">Assign roles for this user in domain <strong>{{.DomainName}}</strong></p>
    </div>
  </div>

  <div class="card">
    <div class="card-content" style="padding: 16px;">
      {{template "user_roles_list" .}}
    </div>
  </div>
</div>
{{end}}
