{{define "login"}}
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - KAS Bon</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource-variable/jetbrains-mono/index.css">
  <link rel="stylesheet" href="/public/css/styles.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
  <div class="auth-page">
    <div class="auth-container" x-data="loginForm()">
      <div class="auth-header">
        <div class="auth-logo">KAS BON</div>
        <div class="auth-subtitle">Sign in to your account</div>
      </div>

      <div id="login-alert"></div>

      <div class="auth-card">
        <form id="login-form"
              hx-post="/auth/login"
              hx-target="#login-alert"
              hx-swap="innerHTML"
              hx-indicator="#login-form"
              @submit="onSubmit($event)">

          <div class="form-group">
            <label class="form-label" for="username">Username or Email</label>
            <input class="form-input"
                   :class="{'input-error': errors.username}"
                   type="text"
                   id="username"
                   name="username"
                   placeholder="Enter username or email"
                   required
                   x-model="form.username"
                   @input="clearError('username')">
            <template x-if="errors.username">
              <div class="form-error" x-text="errors.username"></div>
            </template>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input class="form-input"
                   :class="{'input-error': errors.password}"
                   type="password"
                   id="password"
                   name="password"
                   placeholder="Enter password"
                   required
                   x-model="form.password"
                   @input="clearError('password')">
            <template x-if="errors.password">
              <div class="form-error" x-text="errors.password"></div>
            </template>
          </div>

          <div class="form-group">
            <div class="checkbox-group">
              <input class="checkbox-input"
                     type="checkbox"
                     id="remember"
                     name="isRemember"
                     x-model="form.isRemember">
              <label class="checkbox-label" for="remember">Remember me</label>
            </div>
          </div>

          <div class="form-actions">
            <button class="btn btn-primary" type="submit" :disabled="loading">
              <span class="htmx-hide-on-request" x-show="!loading">Sign in</span>
              <span class="htmx-indicator" x-show="loading">
                <span class="loading-spinner"></span>
              </span>
            </button>
          </div>
        </form>
      </div>

      <div class="auth-footer">
        Don't have an account? <a href="/register">Create one</a>
      </div>
    </div>
  </div>

<script>
function loginForm() {
  return {
    form: {
      username: '',
      password: '',
      isRemember: false
    },
    errors: {},
    loading: false,

    onSubmit(e) {
      this.errors = {};
      if (!this.form.username.trim()) {
        this.errors.username = 'Username or email is required';
      }
      if (!this.form.password.trim()) {
        this.errors.password = 'Password is required';
      }
      if (Object.keys(this.errors).length > 0) {
        e.preventDefault();
        return;
      }
      this.loading = true;
    },

    clearError(field) {
      delete this.errors[field];
    }
  };
}

document.body.addEventListener('htmx:afterRequest', function(e) {
  if (e.detail.pathInfo && e.detail.pathInfo.requestPath === '/auth/login') {
    var form = document.querySelector('#login-form');
    if (form) {
      var scope = Alpine.$data(form.closest('[x-data]'));
      if (scope) scope.loading = false;
    }

    if (e.detail.xhr && e.detail.xhr.status === 200) {
      var redirect = e.detail.xhr.getResponseHeader('HX-Redirect');
      if (redirect) {
        window.location.href = redirect;
      }
    }
  }
});
</script>
</body>
</html>
{{end}}
