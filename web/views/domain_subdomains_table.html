{{define "domain_subdomains_table"}}
<div id="domain-subdomains-table-area">
  <div class="card">
    <div class="card-content">
      {{if .ChildDomains}}
      <table class="data-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Description</th>
            <th>Created</th>
          </tr>
        </thead>
        <tbody id="domain-subdomains-table-body">
          {{range .ChildDomains}}
          <tr>
            <td class="cell-name"><a href="/domains/{{.ID}}" hx-get="/domains/{{.ID}}" hx-target="#main-content" hx-select="#main-content" hx-swap="outerHTML" hx-push-url="true">{{.Name}}</a></td>
            <td class="cell-desc">{{if .Description}}{{.Description}}{{else}}<span class="text-muted">&mdash;</span>{{end}}</td>
            <td class="cell-date">{{.CreatedAt.Format "2006-01-02"}}</td>
          </tr>
          {{end}}
        </tbody>
      </table>
      {{else}}
      <div class="empty-state">
        <svg width="32" height="32" viewBox="0 0 16 16" fill="none" stroke="var(--muted-foreground)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="8" cy="4" r="2"></circle>
          <circle cx="4" cy="12" r="2"></circle>
          <circle cx="12" cy="12" r="2"></circle>
          <line x1="8" y1="6" x2="4" y2="10"></line>
          <line x1="8" y1="6" x2="12" y2="10"></line>
          <line x1="4" y1="12" x2="12" y2="12"></line>
        </svg>
        <p>No subdomains under this domain.</p>
      </div>
      {{end}}
    </div>
  </div>
</div>
{{end}}
