{{define "orgs_table"}}
<div id="orgs-table-area">
  <div class="card">
    <div class="card-content">
      {{if .Organizations}}
      <table class="data-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Description</th>
            <th class="col-actions"></th>
          </tr>
        </thead>
        <tbody id="orgs-table-body">
          {{range .Organizations}}
          {{template "org_row" .}}
          {{end}}
        </tbody>
      </table>
      {{else}}
      <div class="empty-state">
        <svg width="32" height="32" viewBox="0 0 16 16" fill="none" stroke="var(--muted-foreground)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="3" width="14" height="10" rx="1"></rect>
          <path d="M1 6h14"></path>
        </svg>
        <p>No organizations yet. Create your first organization to get started.</p>
      </div>
      {{end}}
    </div>
  </div>
</div>
{{end}}
