{{define "domains"}}
{{template "layout" .}}
{{end}}

{{define "domains_content"}}
<div class="domains-page">
  <div class="section-header">
    <p class="section-desc">Manage your domains and organizations</p>
    <button class="btn btn-primary" hx-get="/domains/new" hx-target="#domain-dialog-content" hx-swap="innerHTML"
            @click="document.getElementById('domain-dialog').showModal()">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="8" y1="2" x2="8" y2="14"></line>
        <line x1="2" y1="8" x2="14" y2="8"></line>
      </svg>
      New Domain
    </button>
  </div>

  {{template "domains_table" .}}

  <dialog id="domain-dialog" class="dialog">
    <div class="dialog-content" id="domain-dialog-content">
    </div>
  </dialog>
</div>
{{end}}
