{{define "role_form_create"}}
<div class="dialog-header">
  <h2 class="dialog-title">Create Role</h2>
  <button class="dialog-close" onclick="document.getElementById('role-dialog').close()">&times;</button>
</div>
<form hx-post="/domains/{{.DomainID}}/roles" hx-target="#domains-roles-table-body" hx-swap="beforeend"
      hx-on::after-request="document.getElementById('role-dialog').close()"
      data-toast-success="Role created" data-toast-error="Failed to create role">
  <input type="hidden" name="domainId" value="{{.DomainID}}">
  <div class="form-group">
    <label class="form-label" for="role-name">Name</label>
    <input class="form-input" type="text" id="role-name" name="name" placeholder="Role name" required>
  </div>
  <div class="form-group">
    <label class="form-label" for="role-desc">Description</label>
    <input class="form-input" type="text" id="role-desc" name="description" placeholder="Optional description">
  </div>
  <div class="dialog-footer">
    <button type="submit" class="btn btn-primary">Create</button>
    <button type="button" class="btn btn-outline" onclick="document.getElementById('role-dialog').close()">Cancel</button>
  </div>
</form>
{{end}}
