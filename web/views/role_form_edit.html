{{define "role_form_edit"}}
<div class="dialog-header">
  <h2 class="dialog-title">Edit Role</h2>
  <button class="dialog-close" onclick="document.getElementById('role-dialog').close()">&times;</button>
</div>
<form hx-put="/roles/{{.ID}}" hx-target="#role-row-{{.ID}}" hx-swap="outerHTML"
      hx-on::after-request="document.getElementById('role-dialog').close()">
  <div class="form-group">
    <label class="form-label" for="role-name">Name</label>
    <input class="form-input" type="text" id="role-name" name="name" value="{{.Name}}" disabled>
  </div>
  <div class="form-group">
    <label class="form-label" for="role-desc">Description</label>
    <input class="form-input" type="text" id="role-desc" name="description" value="{{.Description}}" placeholder="Optional description">
  </div>
  <div class="dialog-footer">
    <button type="submit" class="btn btn-primary">Update</button>
    <button type="button" class="btn btn-outline" onclick="document.getElementById('role-dialog').close()">Cancel</button>
  </div>
</form>
{{end}}
