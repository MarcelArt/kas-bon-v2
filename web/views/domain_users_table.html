{{define "domain_users_table"}}
<div id="domain-users-table-area">
  <div class="card">
    <div class="card-content">
      {{if .Users}}
      <table class="data-table">
        <thead>
          <tr>
            <th>Username</th>
            <th>Email</th>
            <th>Role</th>
            <th>Joined</th>
            <th class="col-actions"></th>
          </tr>
        </thead>
        <tbody>
          {{range .Users}}
          <tr>
            <td class="cell-name">{{.Username}}</td>
            <td class="cell-desc">{{.Email}}</td>
            <td>
              {{range .RoleNames}}<span class="badge">{{.}}</span> {{end}}
            </td>
            <td class="cell-date">{{.CreatedAt.Format "2006-01-02"}}</td>
            <td class="col-actions">
              <div class="cell-actions">
                <a href="/domains/{{$.Domain.ID}}/users/{{.ID}}/roles" class="btn btn-ghost btn-xs" title="Assign Roles"
                   hx-get="/domains/{{$.Domain.ID}}/users/{{.ID}}/roles" hx-target="#main-content" hx-select="#main-content" hx-swap="outerHTML" hx-push-url="true">
                  <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M8 1L2 4v4c0 3.5 2.6 6.8 6 7.5 3.4-.7 6-4 6-7.5V4L8 1z"></path>
                    <path d="M5.5 8l2 2 3-3"></path>
                  </svg>
                </a>
              </div>
            </td>
          </tr>
          {{end}}
        </tbody>
      </table>
      {{else}}
      <div class="empty-state">
        <svg width="32" height="32" viewBox="0 0 16 16" fill="none" stroke="var(--muted-foreground)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1z"></path>
          <path d="M8 5v3"></path>
          <circle cx="8" cy="11" r="0.5" fill="currentColor" stroke="none"></circle>
        </svg>
        <p>No users in this domain yet.</p>
      </div>
      {{end}}
    </div>
  </div>
</div>
{{end}}
