{{define "org_form_create"}}
<div class="dialog-header">
  <h2 class="dialog-title">Create Organization</h2>
  <button class="dialog-close" onclick="document.getElementById('org-dialog').close()">&times;</button>
</div>
<form hx-post="/organizations" hx-target="#orgs-table-body" hx-swap="beforeend"
      hx-on::after-request="document.getElementById('org-dialog').close()">
  <input type="hidden" name="isOrganization" value="true">
  <div class="form-group">
    <label class="form-label" for="org-name">Name</label>
    <input class="form-input" type="text" id="org-name" name="name" placeholder="Organization name" required>
  </div>
  <div class="form-group">
    <label class="form-label" for="org-desc">Description</label>
    <input class="form-input" type="text" id="org-desc" name="description" placeholder="Optional description">
  </div>
  <div class="dialog-footer">
    <button type="submit" class="btn btn-primary">Create</button>
    <button type="button" class="btn btn-outline" onclick="document.getElementById('org-dialog').close()">Cancel</button>
  </div>
</form>
{{end}}
