{{define "select_org"}}
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Organization - KAS Bon</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource-variable/jetbrains-mono/index.css">
  <link rel="stylesheet" href="/public/css/styles.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-header">
        <div class="auth-logo">KAS BON</div>
        <div class="auth-subtitle">Select an organization</div>
      </div>

      <div class="auth-card">
        <div class="org-list">
          {{range .Organizations}}
          <form method="POST" action="/select-org">
            <input type="hidden" name="domain_id" value="{{.ID}}">
            <button type="submit" class="org-item">
              <div class="org-item-info">
                <span class="org-item-name">{{.Name}}</span>
                {{if .Description}}<span class="org-item-desc">{{.Description}}</span>{{end}}
              </div>
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 3 11 8 6 13"></polyline>
              </svg>
            </button>
          </form>
          {{end}}
        </div>
      </div>
    </div>
  </div>
</body>
</html>
{{end}}
