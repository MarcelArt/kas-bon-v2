{{define "role_row"}}
<tr id="role-row-{{.ID}}">
  <td class="cell-name">{{.Name}}</td>
  <td class="cell-desc">{{if .Description}}{{.Description}}{{else}}<span class="text-muted">&mdash;</span>{{end}}</td>
  <td class="cell-date">{{.CreatedAt.Format "2006-01-02"}}</td>
  <td class="col-actions">
    <div class="cell-actions">
      {{if .CanReadPermissions}}
      <a href="/roles/{{.ID}}/permissions" class="btn btn-ghost btn-xs" title="Permissions"
         hx-get="/roles/{{.ID}}/permissions" hx-target="#main-content" hx-select="#main-content" hx-swap="outerHTML" hx-push-url="true">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 1L2 4v4c0 3.5 2.6 6.8 6 7.5 3.4-.7 6-4 6-7.5V4L8 1z"></path>
          <path d="M5.5 8l2 2 3-3"></path>
        </svg>
      </a>
      {{end}}
      {{if .CanUpdate}}
      <button class="btn btn-ghost btn-xs" title="Edit"
              hx-get="/roles/{{.ID}}/edit" hx-target="#role-dialog-content" hx-swap="innerHTML"
              @click="document.getElementById('role-dialog').showModal()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11.5 1.5a2.121 2.121 0 1 1 3 3L5 14l-4 1 1-4 9.5-9.5z"></path>
        </svg>
      </button>
      {{end}}
      {{if .CanDelete}}
      <button class="btn btn-ghost btn-xs" title="Delete"
              hx-delete="/roles/{{.ID}}"
              hx-confirm="Delete this role?"
              hx-target="closest tr"
              hx-swap="outerHTML swap:0.3s"
              data-toast-success="Role deleted" data-toast-error="Failed to delete role">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 4 4 14 12 14 13 4"></polyline>
          <line x1="2" y1="4" x2="14" y2="4"></line>
          <path d="M5 4V2h6v2"></path>
        </svg>
      </button>
      {{end}}
    </div>
  </td>
</tr>
{{end}}
