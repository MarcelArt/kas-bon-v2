{{define "subdomain_form_create"}}
<div class="dialog-header">
  <h2 class="dialog-title">Create Subdomain</h2>
  <button class="dialog-close" onclick="document.getElementById('subdomain-dialog').close()">&times;</button>
</div>
<form hx-post="/domains/{{.ParentID}}/subdomains" hx-target="#domain-subdomains-table-area" hx-swap="outerHTML"
      hx-on::after-request="document.getElementById('subdomain-dialog').close()"
      data-toast-success="Subdomain created" data-toast-error="Failed to create subdomain">
  <input type="hidden" name="parentId" value="{{.ParentID}}">
  <input type="hidden" name="isOrganization" value="false">
  <div class="form-group">
    <label class="form-label" for="subdomain-name">Name</label>
    <input class="form-input" type="text" id="subdomain-name" name="name" placeholder="Subdomain name" required>
  </div>
  <div class="form-group">
    <label class="form-label" for="subdomain-desc">Description</label>
    <input class="form-input" type="text" id="subdomain-desc" name="description" placeholder="Optional description">
  </div>
  <div class="dialog-footer">
    <button type="submit" class="btn btn-primary">Create</button>
    <button type="button" class="btn btn-outline" onclick="document.getElementById('subdomain-dialog').close()">Cancel</button>
  </div>
</form>
{{end}}
