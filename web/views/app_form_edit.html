{{define "app_form_edit"}}
<div class="dialog-header">
  <h2 class="dialog-title">Edit App</h2>
  <button class="dialog-close" onclick="document.getElementById('app-dialog').close()">&times;</button>
</div>
<form hx-put="/apps/{{.ID}}" hx-target="#app-row-{{.ID}}" hx-swap="outerHTML"
      hx-on::after-request="document.getElementById('app-dialog').close()"
      data-toast-success="App updated" data-toast-error="Failed to update app">
  <div class="form-group">
    <label class="form-label" for="app-name">Name</label>
    <input class="form-input" type="text" id="app-name" name="name" value="{{.Name}}" disabled>
  </div>
  <div class="form-group">
    <label class="form-label" for="app-desc">Description</label>
    <input class="form-input" type="text" id="app-desc" name="description" value="{{.Description}}" placeholder="Optional description">
  </div>
  <div class="dialog-footer">
    <button type="submit" class="btn btn-primary">Update</button>
    <button type="button" class="btn btn-outline" onclick="document.getElementById('app-dialog').close()">Cancel</button>
  </div>
</form>
{{end}}
