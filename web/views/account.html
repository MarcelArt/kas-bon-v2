{{define "account"}}
{{template "layout" .}}
{{end}}

{{define "account_content"}}
<div class="account-page" x-data="{ activeTab: 'profile' }">
  <div class="tabs">
    <div class="tab-list">
      <button class="tab" :class="{ 'tab-active': activeTab === 'profile' }" @click="activeTab = 'profile'">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="8" cy="4" r="2.5"></circle>
          <path d="M3 14v-1c0-2 2.2-3.5 5-3.5s5 1.5 5 3.5v1"></path>
        </svg>
        Profile
      </button>
      <button class="tab" :class="{ 'tab-active': activeTab === 'invitations' }" @click="activeTab = 'invitations'">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 4l6-3 6 3v5c0 3.5-2.6 6.8-6 7.5-3.4-.7-6-4-6-7.5V4z"></path>
        </svg>
        Invitations
      </button>
    </div>

    <div x-show="activeTab === 'profile'" x-cloak>
      <div class="card">
        <div class="card-content">
          <div style="padding: 16px;">
            <h3 class="section-title" style="margin-bottom: 16px;">Update Profile</h3>
            <div id="account-alert"></div>
            <form hx-put="/account"
                  hx-target="#account-alert"
                  hx-swap="innerHTML">
              <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input class="form-input" type="text" id="username" name="username" value="{{.User.Username}}" disabled>
              </div>
              <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input class="form-input" type="email" id="email" name="email" value="{{.User.Email}}" required>
              </div>
              <div class="form-group">
                <label class="form-label" for="password">New Password</label>
                <input class="form-input" type="password" id="password" name="password" placeholder="Leave blank to keep current">
              </div>
              <div class="form-actions">
                <button class="btn btn-primary" type="submit">Save Changes</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <div x-show="activeTab === 'invitations'" x-cloak>
      {{template "account_invitations_table" .}}
    </div>
  </div>
</div>
{{end}}
