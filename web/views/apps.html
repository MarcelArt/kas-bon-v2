{{define "apps"}}
{{template "layout" .}}
{{end}}

{{define "content"}}
<div class="apps-page">
  <div class="section-header">
    <p class="section-desc">Manage your registered applications</p>
    <button class="btn btn-primary" hx-get="/apps/new" hx-target="#app-dialog-content" hx-swap="innerHTML"
            @click="document.getElementById('app-dialog').showModal()">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="8" y1="2" x2="8" y2="14"></line>
        <line x1="2" y1="8" x2="14" y2="8"></line>
      </svg>
      New App
    </button>
  </div>

  <div class="card">
    <div class="card-content">
      {{if .Apps}}
      <table class="data-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Description</th>
            <th>Created</th>
            <th class="col-actions"></th>
          </tr>
        </thead>
        <tbody id="apps-table-body">
          {{range .Apps}}
          {{template "app_row" .}}
          {{end}}
        </tbody>
      </table>
      {{else}}
      <div class="empty-state">
        <svg width="32" height="32" viewBox="0 0 16 16" fill="none" stroke="var(--muted-foreground)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="5" height="5"></rect>
          <rect x="9" y="2" width="5" height="5"></rect>
          <rect x="2" y="9" width="5" height="5"></rect>
          <rect x="9" y="9" width="5" height="5"></rect>
        </svg>
        <p>No apps yet. Create your first app to get started.</p>
      </div>
      {{end}}
    </div>
  </div>

  <dialog id="app-dialog" class="dialog">
    <div class="dialog-content" id="app-dialog-content">
    </div>
  </dialog>
</div>
{{end}}
